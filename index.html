<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tastely — Follow Your Interests</title>
    <meta name="description" content="Follow your interests. Stay organized and discover better recommendations.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #121212;
            color: #F1F1F1;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 680px;
            margin: 0 auto;
            padding: 0 24px;
        }

        /* Nav */
        nav {
            max-width: 680px;
            margin: 0 auto;
            padding: 4px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .logo img {
            height: 128px;
            width: auto;
            opacity: 0.9;
        }
        .nav-pill {
            padding: 6px 14px;
            background: rgba(139, 82, 238, 0.08);
            border: 1px solid rgba(139, 82, 238, 0.15);
            border-radius: 100px;
            font-size: 12px;
            font-weight: 500;
            color: #8b52ee;
            letter-spacing: 0.5px;
        }

        /* Hero */
        .hero {
            padding: 0 0 60px;
            text-align: center;
        }

        .hero-wordmark {
            width: 200px;
            height: auto;
            margin-bottom: 32px;
            opacity: 0.95;
            animation: fadeIn 0.8s ease both;
        }

        h1 {
            font-weight: 700;
            font-size: clamp(26px, 4vw, 36px);
            line-height: 1.15;
            letter-spacing: -0.5px;
            margin-bottom: 20px;
            color: #F1F1F1;
            animation: fadeIn 0.8s ease 0.1s both;
        }
        h1 .gradient {
            background: linear-gradient(135deg, #8b52ee, #fb4c96, #3ab7f2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .hero-sub {
            font-family: 'Outfit', sans-serif;
            font-size: 15px;
            font-weight: 400;
            color: #A1A1A1;
            max-width: 440px;
            margin: 0 auto 48px;
            line-height: 1.6;
            animation: fadeIn 0.8s ease 0.2s both;
        }

        /* Email form */
        .waitlist-form {
            display: flex;
            gap: 10px;
            max-width: 440px;
            margin: 0 auto;
            animation: fadeIn 0.8s ease 0.3s both;
        }
        .waitlist-form input {
            flex: 1;
            padding: 14px 18px;
            background: #1A1A1A;
            border: 1px solid #242424;
            border-radius: 12px;
            color: #F1F1F1;
            font-family: 'Outfit', sans-serif;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s ease;
        }
        .waitlist-form input::placeholder {
            color: #6B6B6B;
        }
        .waitlist-form input:focus {
            border-color: rgba(139, 82, 238, 0.4);
        }
        .waitlist-form button {
            padding: 14px 28px;
            background: linear-gradient(135deg, #8b52ee, #fb4c96);
            border: none;
            border-radius: 12px;
            color: #FFFFFF;
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
        }
        .waitlist-form button:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(139, 82, 238, 0.3);
        }

        .waitlist-note {
            font-family: 'Outfit', sans-serif;
            margin-top: 14px;
            font-size: 13px;
            color: #6B6B6B;
            text-align: center;
            animation: fadeIn 0.8s ease 0.4s both;
        }

        /* Success state */
        .waitlist-success {
            display: none;
            padding: 16px 28px;
            background: rgba(139, 82, 238, 0.06);
            border: 1px solid rgba(139, 82, 238, 0.2);
            border-radius: 12px;
            color: #A1A1A1;
            font-weight: 500;
            font-size: 15px;
            max-width: 440px;
            margin: 0 auto;
            text-align: center;
        }

        @media (max-width: 640px) {
            .waitlist-form { flex-direction: column; }
            .waitlist-form button { width: 100%; }
            .hero { padding: 0 0 48px; }
        }

        /* Footer */
        footer {
            border-top: 1px solid #1F1F1F;
            padding: 28px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        footer .logo img { height: 20px; opacity: 0.5; }
        .footer-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .footer-link {
            font-size: 12px;
            color: #6B6B6B;
            text-decoration: none;
            transition: color 0.2s ease;
        }
        .footer-link:hover { color: #A1A1A1; }
        footer p {
            font-size: 12px;
            color: #6B6B6B;
        }

        /* Subtle ambient glow */
        .glow {
            position: fixed;
            border-radius: 50%;
            filter: blur(140px);
            pointer-events: none;
            z-index: 0;
        }
        .glow-1 {
            width: 500px; height: 500px;
            background: rgba(139, 82, 238, 0.08);
            top: -150px; left: 50%;
            transform: translateX(-50%);
        }
        .glow-2 {
            width: 300px; height: 300px;
            background: rgba(251, 76, 150, 0.05);
            bottom: 10%; right: -80px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="glow glow-1"></div>
    <div class="glow glow-2"></div>

    <nav style="position: relative; z-index: 1;">
        <div class="logo"><img src="wordmark.png" alt="Tastely"></div>
        <div class="nav-pill">Coming Soon</div>
    </nav>

    <div class="container">
        <section class="hero" id="waitlist">
            <h1>Follow your interests</h1>
            <p class="hero-sub">Stay organized and discover better recommendations.</p>

            <form class="waitlist-form" id="waitlistForm">
                <input type="email" placeholder="Enter your email" required id="emailInput">
                <button type="submit">Join Waitlist</button>
            </form>
            <div class="waitlist-success" id="waitlistSuccess">
                You're on the list. We'll be in touch.
            </div>
            <p class="waitlist-note">Be first to know when we launch.</p>
        </section>

        <footer>
            <div class="logo"><img src="wordmark.png" alt="Tastely"></div>
            <div class="footer-right">
                <a href="/privacy.html" class="footer-link">Privacy</a>
                <a href="/terms.html" class="footer-link">Terms</a>
                <p>&copy; 2026 Tastely</p>
            </div>
        </footer>
    </div>

    <script>
        document.getElementById('waitlistForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const email = document.getElementById('emailInput').value;
            const btn = this.querySelector('button');
            const origText = btn.textContent;
            btn.textContent = 'Joining...';
            btn.disabled = true;

            try {
                const res = await fetch('https://uwekxpvvukpzvlnxqzpd.supabase.co/functions/v1/waitlist-signup', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV3ZWt4cHZ2dWtwenZsbnhxenBkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1MDY3NjcsImV4cCI6MjA4OTA4Mjc2N30.bNOc3ElhbWggEQtquYM7FgClHubbeDgwQeArCTQobTE'
                    },
                    body: JSON.stringify({ email: email })
                });

                if (res.ok) {
                    this.style.display = 'none';
                    document.getElementById('waitlistSuccess').style.display = 'block';
                    document.querySelector('.waitlist-note').style.display = 'none';
                } else {
                    throw new Error('Signup failed');
                }
            } catch (err) {
                btn.textContent = origText;
                btn.disabled = false;
                alert('Something went wrong. Please try again.');
            }
        });
    </script>

</body>
</html>
