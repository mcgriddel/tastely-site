<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Open in Tastely</title>
    <meta name="description" content="Open this link in the Tastely app.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700&family=Outfit:wght@400&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #121212;
            color: #F1F1F1;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
        }
        .card {
            text-align: center;
            padding: 48px 32px;
            max-width: 400px;
        }
        .icon {
            width: 80px;
            height: 80px;
            border-radius: 20px;
            margin: 0 auto 28px;
            overflow: hidden;
        }
        .icon img { width: 100%; height: 100%; object-fit: cover; }
        h1 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 10px;
            letter-spacing: -0.3px;
        }
        .sub {
            font-family: 'Outfit', sans-serif;
            font-size: 15px;
            color: #A1A1A1;
            margin-bottom: 36px;
            line-height: 1.5;
        }
        .btn {
            display: inline-block;
            padding: 14px 36px;
            background: linear-gradient(135deg, #8b52ee, #fb4c96);
            border: none;
            border-radius: 12px;
            color: #FFFFFF;
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-bottom: 16px;
        }
        .btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(139, 82, 238, 0.3);
        }
        .home-link {
            display: block;
            font-size: 13px;
            color: #6B6B6B;
            text-decoration: none;
            transition: color 0.2s ease;
        }
        .home-link:hover { color: #A1A1A1; }
        .glow {
            position: fixed;
            width: 400px; height: 400px;
            border-radius: 50%;
            filter: blur(140px);
            pointer-events: none;
            background: rgba(139, 82, 238, 0.08);
            top: -100px; left: 50%;
            transform: translateX(-50%);
        }
    </style>
</head>
<body>
    <div class="glow"></div>
    <div class="card">
        <div class="icon"><img src="/tastely-logo.png" alt="Tastely"></div>
        <h1>Open in Tastely</h1>
        <p class="sub" id="message">Tap below to view this in the app.</p>
        <a class="btn" id="openBtn" href="#">Open App</a>
        <br>
        <a class="home-link" href="/">Back to trytastely.com</a>
    </div>

    <script>
        (function() {
            var path = window.location.pathname;
            var search = window.location.search;
            var deepLink = 'tastely://' + path.replace(/^\//, '') + search;

            // Try to open the app via custom scheme
            var btn = document.getElementById('openBtn');
            btn.href = deepLink;

            // On mobile, try to open immediately
            var ua = navigator.userAgent || '';
            var isMobile = /iPhone|iPad|iPod|Android/i.test(ua);

            if (isMobile) {
                // Attempt custom scheme redirect
                window.location.href = deepLink;

                // If still here after 1.5s, the app isn't installed — show store link
                setTimeout(function() {
                    var isIOS = /iPhone|iPad|iPod/i.test(ua);
                    if (isIOS) {
                        btn.href = 'https://apps.apple.com/app/tastely/id0000000000';
                        btn.textContent = 'Get on the App Store';
                    } else {
                        btn.href = 'https://play.google.com/store/apps/details?id=com.tastely.android';
                        btn.textContent = 'Get on Google Play';
                    }
                    document.getElementById('message').textContent = 'Get the Tastely app to view this content.';
                }, 1500);
            }

            // Set contextual message based on path
            if (path.startsWith('/movie/')) {
                document.getElementById('message').textContent = 'Tap below to see this movie in Tastely.';
            } else if (path.startsWith('/user/')) {
                document.getElementById('message').textContent = 'Tap below to see this profile in Tastely.';
            } else if (path.startsWith('/library/')) {
                document.getElementById('message').textContent = 'Tap below to see this board in Tastely.';
            } else if (path.startsWith('/item/')) {
                document.getElementById('message').textContent = 'Tap below to view this in Tastely.';
            }
        })();
    </script>
</body>
</html>
